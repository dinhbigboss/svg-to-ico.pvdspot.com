<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col items-center justify-center text-center p-4">
    <div class="max-w-md w-full">
        <div class="w-24 h-24 mx-auto bg-primary-100 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 rounded-full flex items-center justify-center mb-8">
            <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                <rect width="512" height="512" rx="128" fill="currentColor"/>
                <path d="M156 156H356V356H156V156Z" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M256 156V356" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M156 256H356" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1 class="text-6xl font-bold text-slate-900 dark:text-white mb-4">404</h1>
        <h2 class="text-2xl font-semibold text-slate-800 dark:text-slate-200 mb-4">Page Not Found</h2>
        <p class="text-slate-600 dark:text-slate-400 mb-8">
            The page you are looking for doesn't exist or has been moved.
        </p>
        <div class="space-y-4">
            <a href="/" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-primary-600 hover:bg-primary-700 transition-colors w-full">
                Go to Homepage
            </a>
            <button onclick="history.back()" class="inline-flex items-center justify-center px-6 py-3 border border-slate-300 dark:border-slate-700 text-base font-medium rounded-lg text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors w-full">
                Go Back
            </button>
        </div>
    </div>
    <div id="cookie-banner" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 shadow-lg transform translate-y-full transition-transform duration-300 z-50 p-4 text-left">
        <div class="container mx-auto max-w-4xl flex flex-col md:flex-row items-center justify-between gap-4">
            <p class="text-sm text-slate-600 dark:text-slate-300">
                We use cookies to improve your experience and analyze traffic. By using our website, you agree to our use of cookies.
            </p>
            <button id="cookie-accept" class="px-6 py-2 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 text-sm font-medium rounded-lg hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors whitespace-nowrap">
                Got It
            </button>
        </div>
    </div>
    <script>
        const cookieBanner = document.getElementById('cookie-banner');
        const cookieAccept = document.getElementById('cookie-accept');
        if (!localStorage.getItem('cookie-consent')) {
            setTimeout(() => {
                cookieBanner.classList.remove('translate-y-full');
            }, 1000);
        }
        cookieAccept.addEventListener('click', () => {
            localStorage.setItem('cookie-consent', 'true');
            cookieBanner.classList.add('translate-y-full');
        });
    </script>
</body>
</html>
